security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_admin_provider:
            entity:
                class: App\Entity\Admin
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_admin_provider
            user_checker: App\Security\UserChecker
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_dashboard
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/verify, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/webhook/whatsapp, roles: PUBLIC_ACCESS }
        - { path: ^/webhook/facebook, roles: PUBLIC_ACCESS }
        - { path: ^/whatsapp/test, roles: PUBLIC_ACCESS }
        - { path: ^/privacy, roles: PUBLIC_ACCESS }
        - { path: ^/terms, roles: PUBLIC_ACCESS }
        - { path: ^/facebook/data-deletion, roles: PUBLIC_ACCESS }
        - { path: ^/facebook/deletion-status, roles: PUBLIC_ACCESS }
        - { path: ^/facebook/callback, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/inbox, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/subscribers, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/whatsapp-bot-manager, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/facebook-bot-manager, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/settings/facebook, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/facebook/connect, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/whatsapp-business/connect, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/ai-settings, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/$, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
