version: '3.8'
name: opensquadron

# ┌──────────────────────────────────────────────────┐
# │  OpenSquadron — Behind Nginx Proxy Manager       │
# │                                                  │
# │  1. cp .env.example .env                         │
# │  2. Edit .env with your secrets                  │
# │  3. docker compose up -d                         │
# └──────────────────────────────────────────────────┘

services:
  app:
    image: opensquadron-app:latest
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-6969}:80"
    volumes:
      - ${APP_CODE_PATH:-.}:/var/www/html
      - /var/www/html/vendor
      - share_data:/var/www/html/var/share
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-ChangeThisToSomethingRandom}
      DATABASE_URL: "mysql://${DB_USER:-opensquadron}:${DB_PASSWORD:-SecureDatabasePassword!}@db:3306/${DB_NAME:-opensquadron}?serverVersion=10.11.2-MariaDB&charset=utf8mb4"
      MAILER_DSN: "null://null"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-SecureRootPassword!}
      MYSQL_DATABASE: ${DB_NAME:-opensquadron}
      MYSQL_USER: ${DB_USER:-opensquadron}
      MYSQL_PASSWORD: ${DB_PASSWORD:-SecureDatabasePassword!}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-SecureRootPassword!}
      UPLOAD_LIMIT: 300M
    depends_on:
      db:
        condition: service_healthy

volumes:
  share_data:
  db_data:
