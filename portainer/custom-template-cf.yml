version: '3.8'
name: opensquadron

services:
  app:
    image: opensquadron-app:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    volumes:
      - {{ APP_CODE_PATH }}:/var/www/html
      - /var/www/html/vendor
      - share_data:/var/www/html/var/share
    environment:
      APP_ENV: {{ APP_ENV }}
      APP_SECRET: {{ APP_SECRET }}
      DATABASE_URL: "mysql://{{ DB_USER }}:{{ DB_PASSWORD }}@db:3306/{{ DB_NAME }}?serverVersion=10.11.2-MariaDB&charset=utf8mb4"
      MAILER_DSN: "null://null"
    depends_on:
      db:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: {{ CLOUDFLARE_TUNNEL_TOKEN }}
    depends_on:
      - app

  db:
    image: mariadb:10.11
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: {{ DB_ROOT_PASSWORD }}
      MYSQL_DATABASE: {{ DB_NAME }}
      MYSQL_USER: {{ DB_USER }}
      MYSQL_PASSWORD: {{ DB_PASSWORD }}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "{{ PMA_PORT }}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: {{ DB_ROOT_PASSWORD }}
      UPLOAD_LIMIT: 300M
    depends_on:
      db:
        condition: service_healthy

volumes:
  share_data:
  db_data:
