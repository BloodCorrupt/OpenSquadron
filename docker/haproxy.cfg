global
    log stdout format raw local0 info
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    option  forwardfor
    option  http-server-close

# Docker Internal DNS Resolver for Dynamic Scaling
resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    hold other 30s
    hold refused 30s
    hold nx 30s
    hold valid 5s

frontend http_front
    bind *:80
    stats enable
    stats uri /haproxy?stats
    stats refresh 5s
    default_backend app_back

backend app_back
    balance roundrobin
    # Automatically resolve up to 6 scaled 'app' replicas using Docker DNS
    server-template app- 6 app:80 check resolvers docker init-addr libc,none
